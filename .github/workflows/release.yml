name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build monolith installer
        run: |
          bash scripts/build-monolith.sh
          bash dist/install-naive-server.sh --version

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/install-naive-server.sh
          generate_release_notes: true
