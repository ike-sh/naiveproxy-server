name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: '.'
          severity: warning

  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Bats
        run: |
          sudo apt-get update
          sudo apt-get install -y bats
      - name: Run Bats tests
        run: bats tests/bats/

  arch-mapping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test architecture detection
        run: |
          chmod +x install-naive-server.sh
          bash install-naive-server.sh --test-arch
          NAIVE_TEST_UNAME_M=x86_64 bash install-naive-server.sh --test-arch | grep -q linux-amd64
          NAIVE_TEST_UNAME_M=aarch64 bash install-naive-server.sh --test-arch | grep -q linux-arm64
